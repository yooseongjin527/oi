name: oi

# ==========================================================
# OI Project — docker-compose
# Day 1 Phase 1 최종본 (6개 서비스):
#   redpanda, redpanda-console, postgres,
#   fastapi, streamlit_admin, collector
# ==========================================================

services:

  # ─── Redpanda ─────────────────────────────────────────────
  redpanda:
    image: redpandadata/redpanda:v24.2.7
    container_name: oi-redpanda
    command:
      - redpanda
      - start
      - --kafka-addr internal://0.0.0.0:9092,external://0.0.0.0:19092
      - --advertise-kafka-addr internal://redpanda:9092,external://localhost:19092
      - --pandaproxy-addr internal://0.0.0.0:8082,external://0.0.0.0:18082
      - --advertise-pandaproxy-addr internal://redpanda:8082,external://localhost:18082
      - --schema-registry-addr internal://0.0.0.0:8081,external://0.0.0.0:18081
      - --rpc-addr redpanda:33145
      - --advertise-rpc-addr redpanda:33145
      - --smp 1
      - --memory 1G
      - --mode dev-container
      - --default-log-level=warn
    ports:
      - "19092:19092"
      - "18081:18081"
      - "18082:18082"
      - "9644:9644"
    volumes:
      - redpanda_data:/var/lib/redpanda/data
    healthcheck:
      test: ["CMD-SHELL", "rpk cluster health | grep -E 'Healthy:.+true' || exit 1"]
      interval: 15s
      timeout: 5s
      retries: 10
      start_period: 30s
    networks:
      - oi-net

  # ─── Redpanda Console ────────────────────────────────────
  redpanda-console:
    image: redpandadata/console:v2.7.2
    container_name: oi-redpanda-console
    depends_on:
      redpanda:
        condition: service_healthy
    environment:
      KAFKA_BROKERS: redpanda:9092
      CONNECT_ENABLED: "false"
    ports:
      - "8088:8080"
    networks:
      - oi-net

  # ─── PostgreSQL ──────────────────────────────────────────
  postgres:
    image: postgres:16-alpine
    container_name: oi-postgres
    environment:
      POSTGRES_USER: ${POSTGRES_USER}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD}
      POSTGRES_DB: ${POSTGRES_DB}
    ports:
      - "5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${POSTGRES_USER} -d ${POSTGRES_DB}"]
      interval: 10s
      timeout: 5s
      retries: 10
      start_period: 10s
    networks:
      - oi-net

  # ─── FastAPI (사용자 대시보드) ───────────────────────────
  fastapi:
    build: ./backend
    container_name: oi-fastapi
    depends_on:
      postgres:
        condition: service_healthy
      opensearch:
        condition: service_healthy
      redpanda:
        condition: service_healthy
    environment:
      POSTGRES_USER: ${POSTGRES_USER}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD}
      POSTGRES_DB: ${POSTGRES_DB}
      POSTGRES_HOST: ${POSTGRES_HOST}
      POSTGRES_PORT: ${POSTGRES_PORT}
      JWT_SECRET_KEY: ${JWT_SECRET_KEY}
      JWT_ALGORITHM: ${JWT_ALGORITHM}
      JWT_EXPIRE_MINUTES: ${JWT_EXPIRE_MINUTES}
      AWS_DEFAULT_REGION: ${AWS_DEFAULT_REGION}
      AWS_ACCESS_KEY_ID: ${AWS_ACCESS_KEY_ID}
      AWS_SECRET_ACCESS_KEY: ${AWS_SECRET_ACCESS_KEY}
      OI_BEDROCK_REGION: ${OI_BEDROCK_REGION}
      OI_BEDROCK_MODEL_ID: ${OI_BEDROCK_MODEL_ID}
      OI_ATHENA_WORKGROUP: ${OI_ATHENA_WORKGROUP}
      OI_ATHENA_OUTPUT: ${OI_ATHENA_OUTPUT}
      OI_GLUE_DATABASE: ${OI_GLUE_DATABASE}
      OI_OPENSEARCH_HOST: ${OI_OPENSEARCH_HOST}
      ADMIN_EMAIL: ${ADMIN_EMAIL}
      ADMIN_USERNAME: ${ADMIN_USERNAME}
      ADMIN_PASSWORD: ${ADMIN_PASSWORD}
      KAFKA_BOOTSTRAP_SERVERS: ${KAFKA_BOOTSTRAP_SERVERS}
      KAFKA_TOPIC_LIVE: ${KAFKA_TOPIC_LIVE}
    volumes:
      - ./backend:/app
    ports:
      - "8000:8000"
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:8000/health"]
      interval: 15s
      timeout: 5s
      retries: 5
      start_period: 20s
    networks:
      - oi-net

  # ─── Streamlit (운영자 콘솔) ─────────────────────────────
  streamlit_admin:
    build: ./streamlit_admin
    container_name: oi-streamlit-admin
    depends_on:
      postgres:
        condition: service_healthy
      opensearch:
        condition: service_healthy
    environment:
      POSTGRES_USER: ${POSTGRES_USER}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD}
      POSTGRES_DB: ${POSTGRES_DB}
      POSTGRES_HOST: ${POSTGRES_HOST}
      POSTGRES_PORT: ${POSTGRES_PORT}
      ADMIN_IP_WHITELIST: ${ADMIN_IP_WHITELIST}
      AWS_DEFAULT_REGION: ${AWS_DEFAULT_REGION}
      AWS_ACCESS_KEY_ID: ${AWS_ACCESS_KEY_ID}
      AWS_SECRET_ACCESS_KEY: ${AWS_SECRET_ACCESS_KEY}
      OI_ATHENA_WORKGROUP: ${OI_ATHENA_WORKGROUP}
      OI_ATHENA_OUTPUT: ${OI_ATHENA_OUTPUT}
      OI_GLUE_DATABASE: ${OI_GLUE_DATABASE}
      OI_OPENSEARCH_HOST: ${OI_OPENSEARCH_HOST}
    volumes:
      - ./streamlit_admin:/app
    ports:
      - "8501:8501"
    networks:
      - oi-net

  # ─── Collector (GitHub Events → Redpanda) ────────────────
  collector:
    build: ./collector
    container_name: oi-collector
    depends_on:
      redpanda:
        condition: service_healthy
    environment:
      KAFKA_BOOTSTRAP_SERVERS: ${KAFKA_BOOTSTRAP_SERVERS}
      KAFKA_TOPIC_LIVE: ${KAFKA_TOPIC_LIVE}
      GITHUB_TOKEN: ${GITHUB_TOKEN}
      POLL_INTERVAL_SEC: 60
      MAX_PAGES_PER_POLL: 3
      KAFKA_NUM_PARTITIONS: 3
    volumes:
      - ./collector:/app
    restart: unless-stopped
    networks:
      - oi-net

  bronze_writer:
    build:
      context: ./bronze_writer
    container_name: oi-bronze-writer
    depends_on:
      redpanda:
        condition: service_healthy
    environment:
      - KAFKA_BOOTSTRAP_SERVERS=${KAFKA_BOOTSTRAP_SERVERS}
      - KAFKA_TOPIC_LIVE=${KAFKA_TOPIC_LIVE}
      - AWS_S3_BUCKET=${AWS_S3_BUCKET}
      - AWS_REGION=${AWS_REGION}
      # Optional overrides (defaults are sane)
      # - CONSUMER_GROUP_ID=bronze_writer
      # - S3_BRONZE_LIVE_PREFIX=bronze/live
      # - BRONZE_BATCH_SIZE=500
      # - BRONZE_BATCH_INTERVAL_SEC=60
    volumes:
      # Mount host AWS credentials read-only for boto3 auto-discovery
      - ${HOME}/.aws:/root/.aws:ro
    networks:
      - oi-net
    restart: unless-stopped

# ─── OpenSearch (검색 + 인사이트 히스토리) ──────────────────
  opensearch:
    image: opensearchproject/opensearch:2.13.0
    container_name: oi-opensearch
    environment:
      - discovery.type=single-node
      - DISABLE_SECURITY_PLUGIN=true
      - DISABLE_INSTALL_DEMO_CONFIG=true
      - "OPENSEARCH_JAVA_OPTS=-Xms512m -Xmx512m"
      - bootstrap.memory_lock=false
    ulimits:
      memlock:
        soft: -1
        hard: -1
      nofile:
        soft: 65536
        hard: 65536
    ports:
      - "9200:9200"
    volumes:
      - opensearch_data:/usr/share/opensearch/data
    healthcheck:
      test: ["CMD-SHELL", "curl -fs http://localhost:9200/_cluster/health || exit 1"]
      interval: 15s
      timeout: 5s
      retries: 10
      start_period: 40s
    networks:
      - oi-net
    restart: unless-stopped

  # ─── OpenSearch Dashboards (선택, 디버깅용) ─────────────────
  opensearch-dashboards:
    image: opensearchproject/opensearch-dashboards:2.13.0
    container_name: oi-opensearch-dashboards
    depends_on:
      opensearch:
        condition: service_healthy
    environment:
      - 'OPENSEARCH_HOSTS=["http://opensearch:9200"]'
      - DISABLE_SECURITY_DASHBOARDS_PLUGIN=true
    ports:
      - "5601:5601"
    networks:
      - oi-net
    restart: unless-stopped

  # ==========================================================
  # Airflow (LocalExecutor)
  # ==========================================================

  airflow-postgres:
    image: postgres:16-alpine
    container_name: oi-airflow-postgres
    environment:
      - POSTGRES_USER=${AIRFLOW_DB_USER}
      - POSTGRES_PASSWORD=${AIRFLOW_DB_PASSWORD}
      - POSTGRES_DB=${AIRFLOW_DB_NAME}
    volumes:
      - airflow_postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${AIRFLOW_DB_USER} -d ${AIRFLOW_DB_NAME}"]
      interval: 10s
      timeout: 5s
      retries: 5
    networks:
      - oi-net
    restart: unless-stopped

  airflow-init:
    image: apache/airflow:2.10.3
    container_name: oi-airflow-init
    depends_on:
      airflow-postgres:
        condition: service_healthy
    environment:
      - AIRFLOW__CORE__EXECUTOR=LocalExecutor
      - AIRFLOW__DATABASE__SQL_ALCHEMY_CONN=postgresql+psycopg2://${AIRFLOW_DB_USER}:${AIRFLOW_DB_PASSWORD}@airflow-postgres:5432/${AIRFLOW_DB_NAME}
      - AIRFLOW__CORE__FERNET_KEY=${AIRFLOW_FERNET_KEY}
      - AIRFLOW__CORE__LOAD_EXAMPLES=False
      - AIRFLOW__CORE__DAGS_FOLDER=/opt/airflow/dags
    user: "${AIRFLOW_UID}:0"
    volumes:
      - ./airflow/dags:/opt/airflow/dags
      - ./airflow/plugins:/opt/airflow/plugins
      - ./airflow/config:/opt/airflow/config
      - airflow_logs:/opt/airflow/logs
    entrypoint: /bin/bash
    command:
      - -c
      - |
        airflow db migrate && \
        airflow users create \
          --username "${AIRFLOW_ADMIN_USER}" \
          --password "${AIRFLOW_ADMIN_PASSWORD}" \
          --firstname Admin \
          --lastname User \
          --role Admin \
          --email "${AIRFLOW_ADMIN_EMAIL}" \
        || airflow users list
    networks:
      - oi-net

  airflow-scheduler:
    image: apache/airflow:2.10.3
    container_name: oi-airflow-scheduler
    depends_on:
      airflow-postgres:
        condition: service_healthy
      airflow-init:
        condition: service_completed_successfully
    environment:
      - AIRFLOW__CORE__EXECUTOR=LocalExecutor
      - AIRFLOW__DATABASE__SQL_ALCHEMY_CONN=postgresql+psycopg2://${AIRFLOW_DB_USER}:${AIRFLOW_DB_PASSWORD}@airflow-postgres:5432/${AIRFLOW_DB_NAME}
      - AIRFLOW__CORE__FERNET_KEY=${AIRFLOW_FERNET_KEY}
      - AIRFLOW__CORE__LOAD_EXAMPLES=False
      - AIRFLOW__CORE__DAGS_FOLDER=/opt/airflow/dags
      - AIRFLOW__SCHEDULER__DAG_DIR_LIST_INTERVAL=30
      # Day 4부터 boto3 등 추가 패키지가 필요하면 여기 추가
      - _PIP_ADDITIONAL_REQUIREMENTS=boto3==1.35.49 requests==2.32.3 opensearch-py==2.6.0
      # AWS region (boto3가 마운트한 ~/.aws/credentials 의 region 못 읽으면 fallback)
      - AWS_DEFAULT_REGION=${AWS_REGION}
      - AWS_REGION=${AWS_REGION}
      - AWS_S3_BUCKET=${AWS_S3_BUCKET}
      - OI_GLUE_DATABASE=${OI_GLUE_DATABASE}
      - OI_ATHENA_WORKGROUP=${OI_ATHENA_WORKGROUP}
      # categorize_daily DAG 가 필요로 함
      - OI_BEDROCK_REGION=${OI_BEDROCK_REGION}
      - OI_BEDROCK_MODEL_ID=${OI_BEDROCK_MODEL_ID}
      - OI_OPENSEARCH_HOST=${OI_OPENSEARCH_HOST}
    user: "${AIRFLOW_UID}:0"
    volumes:
      - ./airflow/dags:/opt/airflow/dags
      - ./airflow/plugins:/opt/airflow/plugins
      - ./airflow/config:/opt/airflow/config
      - airflow_logs:/opt/airflow/logs
      - ${HOME}/.aws:/home/airflow/.aws:ro
    command: scheduler
    healthcheck:
      test: ["CMD-SHELL", "airflow jobs check --job-type SchedulerJob --hostname \"$${HOSTNAME}\""]
      interval: 30s
      timeout: 10s
      retries: 5
      start_period: 30s
    networks:
      - oi-net
    restart: unless-stopped

  airflow-webserver:
    image: apache/airflow:2.10.3
    container_name: oi-airflow-webserver
    depends_on:
      airflow-postgres:
        condition: service_healthy
      airflow-init:
        condition: service_completed_successfully
    environment:
      - AIRFLOW__CORE__EXECUTOR=LocalExecutor
      - AIRFLOW__DATABASE__SQL_ALCHEMY_CONN=postgresql+psycopg2://${AIRFLOW_DB_USER}:${AIRFLOW_DB_PASSWORD}@airflow-postgres:5432/${AIRFLOW_DB_NAME}
      - AIRFLOW__CORE__FERNET_KEY=${AIRFLOW_FERNET_KEY}
      - AIRFLOW__CORE__LOAD_EXAMPLES=False
      - AIRFLOW__CORE__DAGS_FOLDER=/opt/airflow/dags
      - AIRFLOW__WEBSERVER__EXPOSE_CONFIG=False
      - _PIP_ADDITIONAL_REQUIREMENTS=boto3==1.35.49 requests==2.32.3 opensearch-py==2.6.0       # ← 추가
      - AWS_DEFAULT_REGION=${AWS_REGION}
      - AWS_REGION=${AWS_REGION}
      - AWS_S3_BUCKET=${AWS_S3_BUCKET}
      - OI_GLUE_DATABASE=${OI_GLUE_DATABASE}
      - OI_ATHENA_WORKGROUP=${OI_ATHENA_WORKGROUP}
      - OI_BEDROCK_REGION=${OI_BEDROCK_REGION}
      - OI_BEDROCK_MODEL_ID=${OI_BEDROCK_MODEL_ID}
      - OI_OPENSEARCH_HOST=${OI_OPENSEARCH_HOST}
    user: "${AIRFLOW_UID}:0"
    volumes:
      - ./airflow/dags:/opt/airflow/dags
      - ./airflow/plugins:/opt/airflow/plugins
      - ./airflow/config:/opt/airflow/config
      - airflow_logs:/opt/airflow/logs
      - ${HOME}/.aws:/home/airflow/.aws:ro 
    ports:
      - "8090:8080"
    command: webserver
    healthcheck:
      test: ["CMD", "curl", "--fail", "http://localhost:8080/health"]
      interval: 30s
      timeout: 10s
      retries: 5
      start_period: 30s
    networks:
      - oi-net
    restart: unless-stopped

# ==========================================================
volumes:
  redpanda_data:
  postgres_data:
  airflow_postgres_data:    
  airflow_logs:  
  opensearch_data:

networks:
  oi-net:
    driver: bridge
