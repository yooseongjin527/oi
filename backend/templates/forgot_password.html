{% extends "base.html" %}

{% block extra_css %}
<link rel="stylesheet" href="/static/css/auth.css" />
{% endblock %}

{% block content %}
<div class="auth-container">
    <div class="auth-card">
        <h1 class="auth-title">비밀번호 찾기</h1>
        <p class="auth-sub">
            가입 시 등록한 이메일을 입력하세요. 재설정 링크를 발급해 드립니다.
        </p>

        <form method="post" action="/forgot-password" class="auth-form" id="forgotForm">
            <label class="auth-field">
                <span class="auth-label">이메일</span>
                <input type="email" name="email" required autocomplete="email"
                       autofocus placeholder="you@example.com" />
            </label>
            <button type="submit" class="btn btn--primary auth-submit">재설정 링크 발급</button>
        </form>

        <div class="auth-foot">
            <a href="/login">로그인으로 돌아가기</a>
        </div>

        <div id="authError" class="auth-error" hidden></div>
        <div id="authNotice" class="auth-notice" hidden></div>
    </div>
</div>

<script>
document.getElementById('forgotForm').addEventListener('submit', async (e) => {
    e.preventDefault();
    const form = e.target;
    const fd = new FormData(form);
    const errBox = document.getElementById('authError');
    const okBox  = document.getElementById('authNotice');
    errBox.hidden = true; okBox.hidden = true;

    try {
        const res = await fetch('/forgot-password', { method: 'POST', body: fd });
        const data = await res.json().catch(() => ({}));
        if (!res.ok) {
            errBox.textContent = data.detail || '요청 처리 중 오류가 발생했습니다.';
            errBox.hidden = false;
            return;
        }
        // 발표/개발용 — 발급된 reset URL 을 응답에 포함
        let html = `<p>${data.message || '재설정 링크가 발급되었습니다.'}</p>`;
        if (data.reset_url) {
            html += `
              <div class="auth-token-box">
                <div class="auth-token-label">개발용 재설정 링크 (${data.expires_in_min}분간 유효)</div>
                <a href="${data.reset_url}" class="auth-token-link">${data.reset_url}</a>
              </div>`;
        }
        okBox.innerHTML = html;
        okBox.hidden = false;
    } catch (err) {
        errBox.textContent = '네트워크 오류가 발생했습니다.';
        errBox.hidden = false;
    }
});
</script>
{% endblock %}
