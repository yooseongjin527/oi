{% extends "base.html" %}

{% block extra_css %}
<link rel="stylesheet" href="/static/css/auth.css" />
{% endblock %}

{% block content %}
<div class="auth-container">
    <div class="auth-card">
        <h1 class="auth-title">로그인</h1>
        <p class="auth-sub">계정 정보를 입력하세요.</p>

        <form method="post" action="/login" class="auth-form" id="loginForm">
            <label class="auth-field">
                <span class="auth-label">이메일</span>
                <input type="email" name="email" required autocomplete="email"
                        autofocus placeholder="you@example.com" />
            </label>

            <label class="auth-field">
                <span class="auth-label">비밀번호</span>
                <input type="password" name="password" required
                       autocomplete="current-password" />
            </label>

            <div class="auth-form-foot">
                <a href="/forgot-password">비밀번호를 잊으셨나요?</a>
            </div>

            <button type="submit" class="btn btn--primary auth-submit">로그인</button>
        </form>

        <div class="auth-foot">
            계정이 없으신가요? <a href="/signup">회원가입</a>
        </div>

        <div id="authError" class="auth-error" hidden></div>
    </div>
</div>

<script>
document.getElementById('loginForm').addEventListener('submit', async (e) => {
    e.preventDefault();
    const form = e.target;
    const fd = new FormData(form);
    const errBox = document.getElementById('authError');
    errBox.hidden = true;

    try {
        const res = await fetch('/login', { method: 'POST', body: fd, redirect: 'follow' });
        if (res.redirected) { window.location.href = res.url; return; }
        if (!res.ok) {
            const data = await res.json().catch(() => ({ detail: '로그인에 실패했습니다.' }));
            errBox.textContent = data.detail || '로그인에 실패했습니다.';
            errBox.hidden = false;
        }
    } catch (err) {
        errBox.textContent = '네트워크 오류가 발생했습니다.';
        errBox.hidden = false;
    }
});
</script>
{% endblock %}
