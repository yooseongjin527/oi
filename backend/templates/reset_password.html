{% extends "base.html" %}

{% block extra_css %}
<link rel="stylesheet" href="/static/css/auth.css" />
{% endblock %}

{% block content %}
<div class="auth-container">
    <div class="auth-card">
        <h1 class="auth-title">새 비밀번호 설정</h1>
        <p class="auth-sub">
            새 비밀번호를 입력해 주세요. 토큰은 1회용이며 60분간 유효합니다.
        </p>

        <form method="post" action="/reset-password" class="auth-form" id="resetForm">
            <input type="hidden" name="token" value="{{ token }}" />

            {% if not token %}
            <label class="auth-field">
                <span class="auth-label">토큰</span>
                <input type="text" name="token" required placeholder="발급받은 토큰" />
            </label>
            {% endif %}

            <label class="auth-field">
                <span class="auth-label">새 비밀번호</span>
                <input type="password" name="password" required minlength="8"
                       autocomplete="new-password" placeholder="최소 8자" autofocus />
            </label>

            <button type="submit" class="btn btn--primary auth-submit">비밀번호 변경</button>
        </form>

        <div class="auth-foot">
            <a href="/login">로그인으로 돌아가기</a>
        </div>

        <div id="authError" class="auth-error" hidden></div>
    </div>
</div>

<script>
document.getElementById('resetForm').addEventListener('submit', async (e) => {
    e.preventDefault();
    const form = e.target;
    const fd = new FormData(form);
    const errBox = document.getElementById('authError');
    errBox.hidden = true;
    try {
        const res = await fetch('/reset-password', { method: 'POST', body: fd, redirect: 'follow' });
        if (res.redirected) { window.location.href = res.url; return; }
        if (!res.ok) {
            const data = await res.json().catch(() => ({}));
            errBox.textContent = data.detail || '재설정에 실패했습니다.';
            errBox.hidden = false;
        }
    } catch (err) {
        errBox.textContent = '네트워크 오류가 발생했습니다.';
        errBox.hidden = false;
    }
});
</script>
{% endblock %}
